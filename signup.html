<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>إنشاء حساب - VETM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; }
        body { background-color: #f0f2f5; }
        .brand-red { color: #C62828; }
        .bg-brand-red { background-color: #C62828; }
        .btn-red { background-color: #C62828; color: #fff; }
        .btn-red:hover { background-color: #B71C1C; }
        .link-red { color: #C62828; }
        .link-red:hover { text-decoration: underline; }
        .input-focus:focus { border-color: #C62828; ring-color: #C62828; }
        .password-wrapper { position: relative; }
        .password-wrapper input { padding-left: 48px; }
        .toggle-password {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #888;
            font-size: 20px;
            user-select: none;
        }
        .toggle-password:hover { color: #333; }
        .error-message { color: #C62828; font-size: 13px; margin-top: 4px; display: none; }
    </style>
</head>
<body>

<!--
⚠️ التحذير القانوني:
هذا الكود هو ملكية خاصة لمشروع VETM™ (علامة تجارية قيد الاستخدام).
لا يُسمح بنسخه أو إعادة توزيعه أو استخدامه تجارياً دون موافقة خطية مسبقة من المالك.
أي انتهاك لهذا التحذير سيُعرّض المخالف للمساءلة القانونية.
-->

<!-- n.23.1 -->

<div class="min-h-screen flex flex-col justify-center items-center px-4 py-8">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6 md:p-8">

        <!-- n.23.2 -->
        <div class="text-center mb-6">
            <h1 class="text-4xl font-extrabold brand-red">VETM</h1>
            <p class="text-sm text-gray-600 mt-1">انشاء حساب VETM لتتمكن من ادارة بطاقتك المهنية</p>
        </div>

        <!-- n.23.3 -->
        <form id="signupForm" class="space-y-5">

            <!-- n.23.4 -->
            <div>
                <label for="fullName" class="block text-sm font-bold text-gray-700 mb-1">الاسم الثلاثي</label>
                <input type="text" id="fullName" name="fullName" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#C62828] focus:border-transparent transition"
                       placeholder="مثال: أحمد حسين قاسم" autocomplete="name">
            </div>

            <!-- n.23.5 -->
            <div>
                <label for="email" class="block text-sm font-bold text-gray-700 mb-1">البريد الإلكتروني</label>
                <input type="email" id="email" name="email" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#C62828] focus:border-transparent transition"
                       placeholder="example@domain.com" autocomplete="email">
            </div>

            <!-- n.23.6 -->
            <div>
                <label for="password" class="block text-sm font-bold text-gray-700 mb-1">كلمة السر</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#C62828] focus:border-transparent transition"
                           placeholder="أدخل كلمة السر" autocomplete="new-password">
                    <span class="toggle-password" onclick="togglePasswordVisibility('password')">👁️</span>
                </div>
            </div>

            <!-- n.23.7 -->
            <div>
                <label for="confirmPassword" class="block text-sm font-bold text-gray-700 mb-1">تأكيد كلمة السر</label>
                <div class="password-wrapper">
                    <input type="password" id="confirmPassword" name="confirmPassword" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#C62828] focus:border-transparent transition"
                           placeholder="أعد كتابة كلمة السر" autocomplete="new-password">
                    <span class="toggle-password" onclick="togglePasswordVisibility('confirmPassword')">👁️</span>
                </div>
                <!-- n.23.8 -->
                <div id="passwordError" class="error-message">⚠️ كلمة السر وتأكيدها غير متطابقين.</div>
            </div>

            <!-- n.23.9 -->
            <button type="submit"
                    class="w-full py-3 btn-red font-bold text-lg rounded-xl shadow-md hover:shadow-lg transition duration-200">
                إنشاء حساب
            </button>
        </form>

        <!-- n.23.10 -->
        <div class="flex items-center gap-4 my-6">
            <div class="flex-1 h-px bg-gray-300"></div>
            <div class="w-2 h-2 bg-[#C62828] rounded-full"></div>
            <div class="flex-1 h-px bg-gray-300"></div>
        </div>

        <!-- n.23.11 -->
        <div class="text-center">
            <a href="login.html" class="link-red font-bold text-sm">
                لديك حساب بالفعل؟ سجل الدخول هنا
            </a>
        </div>

        <p class="text-xs text-gray-400 text-center mt-4">
            بإنشاء حساب، أنت توافق على شروط الخدمة وسياسة الخصوصية
        </p>
    </div>
</div>

<!-- n.23.12 -->
<script>
    function togglePasswordVisibility(fieldId) {
        const field = document.getElementById(fieldId);
        const icon = field.parentElement.querySelector('.toggle-password');
        if (field.type === 'password') {
            field.type = 'text';
            icon.textContent = '🙈';
        } else {
            field.type = 'password';
            icon.textContent = '👁️';
        }
    }

    document.getElementById('signupForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;
        const errorDiv = document.getElementById('passwordError');

        if (password !== confirm) {
            errorDiv.style.display = 'block';
            // n.23.13
            return;
        } else {
            errorDiv.style.display = 'none';
            // n.23.14
        }

        // n.23.15
    });
</script>

</body>
</html>
