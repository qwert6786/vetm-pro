<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>إعادة تعيين كلمة السر - VETM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; }
        body { background-color: #f0f2f5; }
        .brand-red { color: #C62828; }
        .bg-brand-red { background-color: #C62828; }
        .btn-red { background-color: #C62828; color: #fff; }
        .btn-red:hover { background-color: #B71C1C; }
        .btn-outline-red { border: 2px solid #C62828; color: #C62828; background: transparent; }
        .btn-outline-red:hover { background-color: #ffebee; }
        .link-red { color: #C62828; }
        .link-red:hover { text-decoration: underline; }
        .input-focus:focus { border-color: #C62828; ring-color: #C62828; }
        .password-wrapper { position: relative; }
        .password-wrapper input { padding-left: 48px; }
        .toggle-password {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #888;
            font-size: 20px;
            user-select: none;
        }
        .toggle-password:hover { color: #333; }
        .error-message { color: #C62828; font-size: 13px; margin-top: 4px; display: none; }
        .success-message { color: #2e7d32; font-size: 13px; margin-top: 4px; display: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

<!--
⚠️ تحذير قانوني:
هذا الكود هو ملكية خاصة لمشروع VETM™ (علامة تجارية قيد الاستخدام).
لا يُسمح بنسخه أو إعادة توزيعه أو استخدامه تجارياً دون موافقة خطية مسبقة من المالك.
أي انتهاك لهذا التحذير سيُعرّض المخالف للمساءلة القانونية وفقاً للقوانين المحلية والدولية.
-->

<!-- n.28.1 -->

<div class="min-h-screen flex flex-col justify-center items-center px-4 py-8">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6 md:p-8">

        <!-- n.28.2 -->
        <div class="text-center mb-6">
            <h1 class="text-4xl font-extrabold brand-red">VETM</h1>
            <p class="text-sm text-gray-600 mt-1">إعادة تعيين كلمة السر</p>
        </div>

        <!-- n.28.3 -->
        <form id="resetForm" class="space-y-5">

            <!-- n.28.4 -->
            <div>
                <label for="resetEmail" class="block text-sm font-bold text-gray-700 mb-1">البريد الإلكتروني</label>
                <input type="email" id="resetEmail" name="resetEmail" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#C62828] focus:border-transparent transition"
                       placeholder="example@domain.com" autocomplete="email">
            </div>

            <!-- n.28.5 -->
            <button type="button" id="sendCodeBtn"
                    class="w-full btn-outline-red font-bold py-3 rounded-xl shadow-sm hover:shadow-md transition duration-200">
                إرسال رمز التحقق
            </button>

            <!-- n.28.6 -->
            <div id="verificationSection" class="hidden">
                <div>
                    <label for="verificationCode" class="block text-sm font-bold text-gray-700 mb-1">رمز التحقق</label>
                    <input type="text" id="verificationCode" name="verificationCode" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#C62828] focus:border-transparent transition"
                           placeholder="أدخل الرقم المكون من 6 أرقام" maxlength="6" inputmode="numeric">
                </div>
                <div id="codeError" class="error-message"></div>
                <div id="codeSuccess" class="success-message"></div>
            </div>

            <!-- n.28.7 -->
            <div id="newPasswordSection" class="hidden">
                <div>
                    <label for="newPassword" class="block text-sm font-bold text-gray-700 mb-1">كلمة السر الجديدة</label>
                    <div class="password-wrapper">
                        <input type="password" id="newPassword" name="newPassword" required
                               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#C62828] focus:border-transparent transition"
                               placeholder="أدخل كلمة السر الجديدة" autocomplete="new-password">
                        <span class="toggle-password" onclick="togglePasswordVisibility('newPassword')">👁️</span>
                    </div>
                </div>
                <div>
                    <label for="confirmNewPassword" class="block text-sm font-bold text-gray-700 mb-1">تأكيد كلمة السر الجديدة</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmNewPassword" name="confirmNewPassword" required
                               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#C62828] focus:border-transparent transition"
                               placeholder="أعد كتابة كلمة السر الجديدة" autocomplete="new-password">
                        <span class="toggle-password" onclick="togglePasswordVisibility('confirmNewPassword')">👁️</span>
                    </div>
                    <div id="passwordMatchError" class="error-message"></div>
                </div>

                <!-- n.28.8 -->
                <button type="submit"
                        class="w-full py-3 btn-red font-bold text-lg rounded-xl shadow-md hover:shadow-lg transition duration-200">
                    تحديث كلمة السر
                </button>
            </div>
        </form>

        <!-- n.28.9 -->
        <div class="flex items-center gap-4 my-6">
            <div class="flex-1 h-px bg-gray-300"></div>
            <div class="w-2 h-2 bg-[#C62828] rounded-full"></div>
            <div class="flex-1 h-px bg-gray-300"></div>
        </div>

        <!-- n.28.10 -->
        <div class="text-center">
            <a href="login.html" class="link-red font-bold text-sm">
                تذكرت كلمة السر؟ سجل الدخول هنا
            </a>
        </div>
    </div>
</div>

<!-- n.28.11 -->
<script>
    function togglePasswordVisibility(fieldId) {
        const field = document.getElementById(fieldId);
        const icon = field.parentElement.querySelector('.toggle-password');
        if (field.type === 'password') {
            field.type = 'text';
            icon.textContent = '🙈';
        } else {
            field.type = 'password';
            icon.textContent = '👁️';
        }
    }

    // n.28.12
    const verificationSection = document.getElementById('verificationSection');
    const newPasswordSection = document.getElementById('newPasswordSection');
    const sendCodeBtn = document.getElementById('sendCodeBtn');
    const resetForm = document.getElementById('resetForm');
    const resetEmail = document.getElementById('resetEmail');
    const verificationCode = document.getElementById('verificationCode');
    const codeError = document.getElementById('codeError');
    const codeSuccess = document.getElementById('codeSuccess');
    const newPassword = document.getElementById('newPassword');
    const confirmNewPassword = document.getElementById('confirmNewPassword');
    const passwordMatchError = document.getElementById('passwordMatchError');

    // n.28.13
    sendCodeBtn.addEventListener('click', function() {
        // n.28.14
        if (!resetEmail.value) {
            alert('يرجى إدخال البريد الإلكتروني أولاً.');
            return;
        }
        // n.28.15
        verificationSection.classList.remove('hidden');
        // n.28.16
        codeError.style.display = 'none';
        codeSuccess.style.display = 'none';
        // n.28.17
        verificationCode.value = '';
        newPasswordSection.classList.add('hidden');
        // n.28.18
    });

    // n.28.19
    resetForm.addEventListener('submit', function(e) {
        e.preventDefault();

        const newPass = newPassword.value;
        const confirmPass = confirmNewPassword.value;

        // n.28.20
        if (newPass !== confirmPass) {
            passwordMatchError.textContent = '⚠️ كلمة السر وتأكيدها غير متطابقين.';
            passwordMatchError.style.display = 'block';
            return;
        } else {
            passwordMatchError.style.display = 'none';
            // n.28.21
        }
    });

    // n.28.22
</script>

</body>
</html>
