<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - VETM</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- تحميل خط Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- تخصيص Tailwind لاستخدام خط Cairo كلغة أساسية -->
    <style>
        * { font-family: 'Cairo', sans-serif; }
        body { background-color: #f0f2f5; }
        .brand-red { color: #C62828; }
        .bg-brand-red { background-color: #C62828; }
        .border-brand-red { border-color: #C62828; }
        .hover\:bg-brand-red-dark:hover { background-color: #B71C1C; }
        .btn-red { background-color: #C62828; color: #fff; }
        .btn-red:hover { background-color: #B71C1C; }
        .link-red { color: #C62828; }
        .link-red:hover { color: #B71C1C; text-decoration: underline; }
        .divider-line { background-color: #ddd; height: 1px; flex: 1; }
        .divider-circle { background-color: #C62828; width: 8px; height: 8px; border-radius: 50%; }
    </style>
</head>
<body>

<div class="min-h-screen flex flex-col justify-center items-center px-4 py-8">
    <!-- بطاقة تسجيل الدخول الرئيسية -->
    <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6 md:p-8">

        <!-- الشعار والنص التسويقي -->
        <div class="text-center mb-6">
            <h1 class="text-4xl font-extrabold brand-red">VETM</h1>
            <p class="text-sm text-gray-600 mt-1">تتيح لك VETM إنشاء بطاقات مهنية مستقلة لكل تخصصاتك</p>
        </div>

        <!-- نموذج تسجيل الدخول -->
        <form id="loginForm" class="space-y-5">
            <!-- حقل البريد الإلكتروني -->
            <div>
                <label for="email" class="block text-sm font-bold text-gray-700 mb-1">البريد الإلكتروني</label>
                <input type="email" id="email" name="email" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#C62828] focus:border-transparent transition"
                       placeholder="example@domain.com" autocomplete="email">
            </div>

            <!-- حقل كلمة السر -->
            <div>
                <div class="flex justify-between items-center mb-1">
                    <label for="password" class="text-sm font-bold text-gray-700">كلمة السر</label>
                    <a href="#reset-password" class="text-xs link-red font-medium">هل نسيت كلمة السر؟</a>
                </div>
                <input type="password" id="password" name="password" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#C62828] focus:border-transparent transition"
                       placeholder="••••••••" autocomplete="current-password">
            </div>

            <!-- زر تسجيل الدخول -->
            <button type="submit"
                    class="w-full py-3 btn-red font-bold text-lg rounded-xl shadow-md hover:shadow-lg transition duration-200">
                تسجيل الدخول
            </button>
        </form>

        <!-- الفاصل الأفقي -->
        <div class="flex items-center gap-4 my-6">
            <div class="divider-line"></div>
            <div class="divider-circle"></div>
            <div class="divider-line"></div>
        </div>

        <!-- زر إنشاء حساب جديد (أسفل النموذج، مثل فيسبوك) -->
        <div class="text-center">
            <a href="#signup" class="w-full inline-block py-3 px-4 border-2 border-brand-red text-brand-red font-bold text-lg rounded-xl hover:bg-red-50 transition duration-200">
                إنشاء حساب جديد
            </a>
            <p class="text-xs text-gray-500 mt-3">بإنشاء حساب، أنت توافق على شروط الخدمة وسياسة الخصوصية</p>
        </div>
    </div>

    <!-- تذييل بسيط (اختياري) -->
    <div class="mt-6 text-xs text-gray-400 text-center">
        <span>© 2026 VETM — جميع الحقوق محفوظة</span>
    </div>
</div>

<!-- جافا سكريبت بسيط للاختبار (مرحلة MVP) -->
<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;

        if (!email || !pass) {
            alert('يرجى ملء جميع الحقول.');
            return;
        }

        // 🔜 في المرحلة القادمة، سنستدعي Apps Script للتحقق الفعلي.
        // حالياً، نعرض رسالة نجاح وهمية للمهني.
        alert(`✅ مرحباً (${email})! تم تسجيل الدخول بنجاح. (هذه رسالة اختبارية، سيتم ربطها بـ Apps Script قريباً).`);

        // سيتم توجيه المهني إلى صفحة البطاقات (cards.html) بعد نجاح التحقق.
        // window.location.href = 'cards.html?email=' + encodeURIComponent(email);
    });

    // روابط مؤقتة لاختبار التنقل (في مرحلة MVP)
    document.querySelector('a[href="#reset-password"]').addEventListener('click', function(e) {
        e.preventDefault();
        alert('سيتم توجيهك إلى صفحة إعادة تعيين كلمة السر (قيد التطوير).');
    });

    document.querySelector('a[href="#signup"]').addEventListener('click', function(e) {
        e.preventDefault();
        alert('سيتم توجيهك إلى صفحة إنشاء حساب جديد (قيد التطوير).');
    });
</script>

</body>
</html>
