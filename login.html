<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>تسجيل الدخول - VETM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; }
        body { background-color: #f0f2f5; }
        .brand-red { color: #C62828; }
        .bg-brand-red { background-color: #C62828; }
        .btn-red { background-color: #C62828; color: #fff; }
        .btn-red:hover { background-color: #B71C1C; }
        .btn-outline-red { border: 2px solid #C62828; color: #C62828; background: transparent; }
        .btn-outline-red:hover { background-color: #ffebee; }
        .link-red { color: #C62828; }
        .link-red:hover { text-decoration: underline; }
        .input-focus:focus { border-color: #C62828; ring-color: #C62828; }
        .divider-line { background-color: #ddd; height: 1px; flex: 1; }
        .divider-circle { background-color: #C62828; width: 8px; height: 8px; border-radius: 50%; }
        .password-wrapper { position: relative; }
        .password-wrapper input { padding-left: 48px; }
        .toggle-password {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #888;
            font-size: 20px;
            user-select: none;
        }
        .toggle-password:hover { color: #333; }
    </style>
</head>
<body>

<!--
⚠️ التحذير القانوني:
هذا الكود هو ملكية خاصة لمشروع VETM™ (علامة تجارية قيد الاستخدام).
لا يُسمح بنسخه أو إعادة توزيعه أو استخدامه تجارياً دون موافقة خطية مسبقة من المالك.
أي انتهاك لهذا التحذير سيُعرّض المخالف للمساءلة القانونية وفقاً للقوانين المحلية والدولية.
-->

<!-- n.21.1 -->

<div class="min-h-screen flex flex-col justify-center items-center px-4 py-8">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6 md:p-8">

        <!-- n.21.2 -->
        <div class="text-center mb-6">
            <h1 class="text-4xl font-extrabold brand-red">VETM</h1>
            <p class="text-sm text-gray-600 mt-1">تتيح لك VETM إنشاء بطاقات مهنية مستقلة لكل تخصصاتك</p>
        </div>

        <!-- n.21.3 -->
        <form id="loginForm" class="space-y-5">
            <!-- n.21.4 -->
            <div>
                <label for="email" class="block text-sm font-bold text-gray-700 mb-1">البريد الإلكتروني</label>
                <input type="email" id="email" name="email" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#C62828] focus:border-transparent transition"
                       placeholder="example@domain.com" autocomplete="email">
            </div>

            <!-- n.21.5 -->
            <div>
                <div class="flex justify-between items-center mb-1">
                    <label for="password" class="text-sm font-bold text-gray-700">كلمة السر</label>
                    <a href="#" id="forgotPasswordLink" class="text-xs link-red font-medium">هل نسيت كلمة السر؟</a>
                </div>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#C62828] focus:border-transparent transition"
                           placeholder="أدخل كلمة السر" autocomplete="current-password">
                    <span class="toggle-password" onclick="togglePasswordVisibility('password')">👁️</span>
                </div>
            </div>

            <!-- n.21.6 -->
            <button type="submit"
                    class="w-full py-3 btn-red font-bold text-lg rounded-xl shadow-md hover:shadow-lg transition duration-200">
                تسجيل الدخول
            </button>
        </form>

        <!-- n.21.7 -->
        <div class="flex items-center gap-4 my-6">
            <div class="divider-line"></div>
            <div class="divider-circle"></div>
            <div class="divider-line"></div>
        </div>

        <!-- n.21.8 -->
        <div class="text-center">
            <a href="#" id="createAccountLink" class="w-full inline-block py-3 px-4 border-2 border-brand-red text-brand-red font-bold text-lg rounded-xl hover:bg-red-50 transition duration-200">
                إنشاء حساب جديد
            </a>
            <p class="text-xs text-gray-500 mt-3">بإنشاء حساب، أنت توافق على شروط الخدمة وسياسة الخصوصية</p>
        </div>

    </div>
</div>

<!-- n.21.9 -->
<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxnhuBva5D8z_zuKqZQ1-WwYSRROjOB2-95GZGKCSKdcPxdBu193pCtv3oAMHLikc9k/exec';

async function callApi(payload) {
    const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
    });
    return response.json();
}

async function login(email, password) {
    const result = await callApi({ action: 'login', email, password });
    if (result.ok) {
        sessionStorage.setItem('token', result.token);
        sessionStorage.setItem('fullName', result.fullName);
        window.location.href = 'cards.html';
    } else {
        alert('فشل تسجيل الدخول: ' + result.error);
    }
    return result;
}

document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    login(email, password);
});
</script>

</body>
</html>
